<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
  <h3> Carousel Example </h3>
<div class="container">

 <div id="myCarousel" class="carousel slide" data-ride="carousel">
  
  <ol class="carousel-indicators">
   <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
   <li data-target="#myCarousel" data-slide-to="1"></li>
   <li data-target="#myCarousel" data-slide-to="2"></li>
  </ol>
  
  <div class="carousel-inner">

    <div class="item active" >
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZoYo7OoLl44YHleKRwUe0jlxNA0XRpzSWRHmcvOkPUisHNA74wRFUfdBut8F7caQ9n1oCB9BhAiPRsKB9hayVoxmvBa0uFST2k5933fi9&s=10" alt="Image 1">
    </div>
    <div class="item"> <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQgMiDDT2a_0X6VJ2TD5ljNKUwawZjTgogBE86dOUEI7mVIreshvVt9HFVGTs7mNaBWjNSk83v8bvMOTd1GSdeGu6qFVHMLPZSVhp2sqp8S&s=10" alt= "image 2"></div>
    <div class="item"> <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT13qkooeyhsNkjwvTXgqUF-n8lrc5lFbquh0v7Ljjii1KvTixAB0cdhHyrVY1KZ48CLGupTmI5ywIiNBkrS00EMTPPsL0Wm9UhiiyO3CkfnA&s=10" alt="image 3"></div>
    





  </div>
  
    <a class="left carousel-control" href="" data-slide="prev">


      <span class="glyphicon glyphicon-chevron-left"></span>


      <span class="sr-only">Previous</span>

      
    </a>
    
    <a class="right carousel-control" href="#myCarousel" data-slide="next">


      <span class="glyphicon glyphicon-chevron-right"></span>


      <span class="sr-only">Next</span>

      
    </a>
  
  
  
  
  
 </div>
</div>

</body>
</html>
